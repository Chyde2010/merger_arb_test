name: Merger Arb Update

on:
  schedule:
    # Runs at 05:30 UTC every weekday (06:30 BST / Mon-Fri)
    - cron: '30 5 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Run merger arb update script
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python src/merger_arb_update.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Merger Arb Bot"
          git add -A
          git diff-index --quiet HEAD || git commit -m "Daily update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
